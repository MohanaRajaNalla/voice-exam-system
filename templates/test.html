<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Exam - MCQ Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">Secure AI Systems Test</div>
        <div class="timer">Time Remaining: 29:59</div>
    </nav>

    <div class="glass-panel main-panel exam-panel">
        <div class="panel-header" style="text-align: left;">
            <h2>Multiple Choice Questions</h2>
            <p>Please select the correct answers for the following questions.</p>
        </div>
        
        <form action="{{ url_for('submit_test') }}" method="POST" class="test-form">
            <div class="question-block">
                <h4>Question 1</h4>
                <p>What does AI stand for?</p>
                <label class="radio-option">
                    <input type="radio" name="q1" value="A">
                    <span class="custom-radio"></span> A. Artificial Intelligence
                </label>
                <label class="radio-option">
                    <input type="radio" name="q1" value="B">
                    <span class="custom-radio"></span> B. Automated Internet
                </label>
                <label class="radio-option">
                    <input type="radio" name="q1" value="C">
                    <span class="custom-radio"></span> C. Advanced Integration
                </label>
                <label class="radio-option">
                    <input type="radio" name="q1" value="D">
                    <span class="custom-radio"></span> D. None
                </label>
            </div>

            <div class="question-block">
                <h4>Question 2</h4>
                <p>Which algorithm is used for speaker verification?</p>
                <label class="radio-option">
                    <input type="radio" name="q2" value="A">
                    <span class="custom-radio"></span> A. Cosine similarity
                </label>
                <label class="radio-option">
                    <input type="radio" name="q2" value="B">
                    <span class="custom-radio"></span> B. Sorting
                </label>
                <label class="radio-option">
                    <input type="radio" name="q2" value="C">
                    <span class="custom-radio"></span> C. Binary search
                </label>
                <label class="radio-option">
                    <input type="radio" name="q2" value="D">
                    <span class="custom-radio"></span> D. Clustering
                </label>
            </div>

            <button type="submit" class="action-btn">Submit Test</button>
        </form>
    </div>
</body>
</html>
